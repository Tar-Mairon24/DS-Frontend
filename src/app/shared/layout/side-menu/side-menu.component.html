<div class="side-menu" [class.collapsed]="isCollapsed">

  <div class="menu-header">
    <span class="brand-name">M&M Bienes Raices</span>
    <button class="toggle-btn" (click)="toggleCollapse()" [title]="isCollapsed ? 'Expandir' : 'Contraer'">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path [attr.d]="isCollapsed ? 'M9 18l6-6-6-6' : 'M15 18l-6-6 6-6'" />
      </svg>
    </button>
  </div>

  <nav class="menu-items">

    <a class="menu-item" (click)="goDashboard()" title="Mis Propiedades">
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </span>
      <span class="label">Mis Propiedades</span>
    </a>

    <a class="menu-item" (click)="goCalendar()" title="Agenda">
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </span>
      <span class="label">Agenda</span>
    </a>

    <a class="menu-item" (click)="goDocuments()" title="Documentos">
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
      <span class="label">Documentos</span>
    </a>

    <a class="menu-item" (click)="goContacts()" title="Contactos">
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </span>
      <span class="label">Contactos</span>
    </a>

    <a class="menu-item" (click)="goSettings()" title="Mi Usuario">
      <span class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M20 21a8 8 0 1 0-16 0"/>
        </svg>
      </span>
      <span class="label">Mi Usuario</span>
    </a>

    @if (propsRole === 'admin') {
      <div class="divider"></div>
      <a class="menu-item" (click)="goUsers()" title="Usuarios">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="label">Usuarios</span>
      </a>
    }

  </nav>

  <div class="menu-footer">
    <div class="user-info">
      <div class="avatar">{{ propsRole === 'admin' ? 'A' : 'U' }}</div>
      <div class="user-details">
        <span class="user-role">{{ propsRole === 'admin' ? 'Administrador' : 'Usuario' }}</span>
        <span class="user-email">{{ userEmail }}</span>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="label">Salir</span>
    </button>
  </div>

</div>

@if (showMfa) {
  <app-mfa
    (close)="onMfaClose()"
    (verified)="onMfaVerified($event)"
    [propsEmail]="propsEmail"
    [propsReason]="propsReason"
  ></app-mfa>
}
