@if (isLoading) {
  <div class="skeleton-page" aria-label="Cargando propiedad">
    <div class="skeleton-block skeleton-slider"></div>

    <div class="detail-body">
      <div class="skeleton-header">
        <div class="skeleton-title-group">
          <div class="skeleton-block skeleton-breadcrumb"></div>
          <div class="skeleton-block skeleton-title"></div>
          <div class="skeleton-meta-row">
            <div class="skeleton-block skeleton-pill"></div>
            <div class="skeleton-block skeleton-price"></div>
          </div>
        </div>
        <div class="skeleton-actions">
          <div class="skeleton-block skeleton-btn"></div>
          <div class="skeleton-block skeleton-btn"></div>
        </div>
      </div>

      <div class="skeleton-block skeleton-quickspecs"></div>

      <div class="bento-grid">
        <div class="bento-left">
          <div class="skeleton-block skeleton-card"></div>
          <div class="skeleton-block skeleton-card"></div>
          <div class="skeleton-block skeleton-card"></div>
        </div>

        <div class="bento-right">
          <div class="skeleton-block skeleton-card skeleton-notes"></div>
          <div class="skeleton-block skeleton-map"></div>
        </div>
      </div>
    </div>
  </div>
} @else if (property) {

  <!-- Full-width image slider -->
  <app-property-slider [images]="images" [propertyId]="property.id" />

  <div class="detail-body">

    <!-- Breadcrumb + title + actions -->
    <div class="detail-header">
      <div class="header-left">
        <button class="btn-back" (click)="goBack()" aria-label="Volver">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          Volver
        </button>
        <nav class="breadcrumb">
          <span class="breadcrumb-link" (click)="router.navigate(['/dashboard'])">Propiedades</span>
          <span class="breadcrumb-sep">›</span>
          <span class="breadcrumb-current">Detalle de Residencia</span>
        </nav>
        <h1 class="property-title">{{ property.title }}</h1>
        <div class="property-meta">
          <span class="status-badge">{{ property.status }}</span>
          <span class="property-price">${{ property.price | number }} <span class="price-currency">USD</span></span>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-secondary" (click)="confirmDelete()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          Eliminar
        </button>
        <button class="btn-primary" (click)="goEdit()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Editar Propiedad
        </button>
      </div>
    </div>

    <!-- Quick specs bar -->
    <app-property-quickspecs [property]="property" />

    <!-- Main bento grid -->
    <div class="bento-grid">

      <!-- Left column -->
      <div class="bento-left">
        <app-property-info [property]="property" />
        <app-property-characteristics [property]="property" />
        <app-property-services-view [property]="property" />
      </div>

      <!-- Right column -->
      <div class="bento-right">
        <app-property-notes-view [property]="property" />
        <div class="map-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
            <line x1="9" y1="3" x2="9" y2="18"/>
            <line x1="15" y1="6" x2="15" y2="21"/>
          </svg>
          <p>Ver Ubicación Exacta</p>
        </div>
      </div>

    </div>
  </div>

  <!-- Delete confirm overlay -->
  @if (showDeleteConfirm) {
    <div class="overlay" (click)="cancelDelete()">
      <div class="confirm-dialog" (click)="$event.stopPropagation()">
        <h3>Eliminar propiedad</h3>
        <p>¿Estás seguro? Esta acción no se puede deshacer.</p>
        <div class="confirm-actions">
          <button class="btn-cancel-dialog" (click)="cancelDelete()">Cancelar</button>
          <button class="btn-delete-dialog" (click)="handleDelete()">Eliminar</button>
        </div>
      </div>
    </div>
  }

}
