<div class="specs-bar">

  <div class="spec-item">
    <div class="spec-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div>
      <span class="spec-label">Habitaciones</span>
      <span class="spec-value">{{ property.bedrooms }} Recámaras</span>
    </div>
  </div>

  <div class="spec-sep"></div>

  <div class="spec-item">
    <div class="spec-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7v11a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7"/>
        <path d="M3 7h3m15 0h-3M3 7a2 2 0 0 1 2-2h2V3h8v2h2a2 2 0 0 1 2 2"/>
      </svg>
    </div>
    <div>
      <span class="spec-label">Baños</span>
      <span class="spec-value">{{ property.bathrooms }} Baños</span>
    </div>
  </div>

  <div class="spec-sep"></div>

  <div class="spec-item">
    <div class="spec-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
      </svg>
    </div>
    <div>
      <span class="spec-label">Construcción</span>
      <span class="spec-value">{{ property.construction_m2 }} m²</span>
    </div>
  </div>

  <div class="spec-sep"></div>

  <div class="spec-item">
    <div class="spec-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
        <line x1="8" y1="2" x2="8" y2="18"/>
        <line x1="16" y1="6" x2="16" y2="22"/>
      </svg>
    </div>
    <div>
      <span class="spec-label">Terreno</span>
      <span class="spec-value">{{ property.land_m2 }} m²</span>
    </div>
  </div>

  <div class="spec-sep"></div>

  <div class="spec-item">
    <div class="spec-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="3" width="15" height="13" rx="1"/>
        <path d="M16 8h5l2 3v3h-7V8z"/>
        <circle cx="5.5" cy="18.5" r="2.5"/>
        <circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
    </div>
    <div>
      <span class="spec-label">Cocheras</span>
      <span class="spec-value">{{ property.garage_size }} Vehículos</span>
    </div>
  </div>

</div>
