<div class="card">
  <div class="card-header">
    <div class="card-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
    </div>
    <h3 class="card-title">Notas Internas</h3>
  </div>

  @if (property.notes) {
    <p class="notes-text">{{ property.notes }}</p>
  } @else {
    <p class="notes-empty">Sin notas registradas.</p>
  }

  @if (property.description) {
    <div class="card-divider"></div>
    <span class="group-label">Descripción pública</span>
    <p class="notes-text">{{ property.description }}</p>
  }
</div>
