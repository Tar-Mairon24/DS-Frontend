<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeModal()">&times;</button>

    <h3>Tenemos que verificar tu identidad</h3>
    <p>Por favor, revisa tu correo electrónico o aplicación de autenticación para obtener el código.</p>
    <p>Ingresa el código de 6 dígitos</p>

    <label for="mfa-code">Código de verificación</label>
    <input
      id="mfa-code"
      type="text"
      maxlength="6"
      (input)="onCodeInput($event)"
      [(ngModel)]="code"
      placeholder="000000"
      class="mfa-input"
      autocomplete="off"
    />

    <button
      (click)="verifyCode()"
      [disabled]="code.length !== 6"
      class="verify-btn">
      Verificar
    </button>

  <div class="auxiliary-btns">
    <button (click)="closeModal()" class="cancel-btn">Cancelar</button>
    <button (click)="resendCode()" class="resend-btn">Reenviar código</button>
  </div>
  </div>
</div>
