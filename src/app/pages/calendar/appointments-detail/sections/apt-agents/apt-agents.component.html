<div class="agents-card">

  <div class="agents-header">
    <span class="agents-label">Agentes Asignados</span>
    <button class="btn-add-agent">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Añadir Agente
    </button>
  </div>

  <div class="agents-list">
    @for (agent of assignedAgents; track agent.id) {
      <div class="agent-chip">
        <div class="agent-avatar">{{ initials(agent.username) }}</div>
        <span class="agent-name">{{ agent.username }}</span>
      </div>
    }
    @if (assignedAgents.length === 0) {
      <span class="no-agents">Sin agentes asignados</span>
    }
  </div>

</div>
