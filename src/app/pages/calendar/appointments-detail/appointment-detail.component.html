<div class="detail-shell">

  @if (isLoading) {
    <div class="loading-state">
      <div class="spinner"></div>
      <span>Cargando cita...</span>
    </div>
  }

  @if (error && !isLoading) {
    <div class="error-state">
      <p>No se pudo cargar la cita.</p>
      <button (click)="goBack()">Volver</button>
    </div>
  }

  @if (apt && !isLoading) {
    <!-- Top bar -->
    <div class="detail-topbar">
      <button class="btn-back" (click)="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Volver Atrás
      </button>

      <div class="topbar-actions">
        <button class="btn-secondary">Editar Cita</button>
        <button class="btn-primary">Reprogramar</button>
      </div>
    </div>

    <!-- Page title row -->
    <div class="title-row">
      <h1 class="detail-title">{{ apt.title }}</h1>
      <span class="status-badge" [class]="'status-' + apt.status">{{ statusLabel }}</span>
    </div>

    <!-- Main content: left column + right sidebar -->
    <div class="detail-body">

      <!-- Left: stacked sections -->
      <div class="left-col">
        <app-apt-info [apt]="apt" />
        <app-apt-people [apt]="apt" />
        <app-apt-agents [agents]="apt.agents" />
      </div>

      <!-- Right: property card (reused from dashboard) + link -->
      <div class="right-col">
        @if (property) {
          <div class="property-card-wrap">
            <app-property-card
              [property]="property"
              [image]="property.main_image_path || ''"
              [showActions]="false"
              (select)="onPropertySelect()"
            />
            <button class="btn-view-property" (click)="navigateToProperty()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              Ver Detalle de Propiedad
            </button>
          </div>
        } @else {
          <!-- Property failed to load or loading — show address only -->
          <div class="property-fallback">
            <span class="fallback-label">Propiedad</span>
            <div class="fallback-title">{{ apt.property_title }}</div>
            <div class="fallback-address">{{ apt.property_address }}</div>
            <button class="btn-view-property" (click)="navigateToProperty()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              Ver Detalle de Propiedad
            </button>
          </div>
        }
      </div>

    </div>
  }

</div>
