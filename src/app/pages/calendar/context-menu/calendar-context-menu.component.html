<div class="ctx-menu"
  [style.left.px]="x"
  [style.top.px]="y"
  (click)="stopProp($event)"
  (contextmenu)="stopProp($event)">

  <!-- ── Reschedule form (replaces menu items when active) ── -->
  @if (showReschedule) {

    <div class="ctx-reschedule">
      <div class="ctx-reschedule-header">
        <button class="ctx-back-btn" (click)="cancelReschedule($event)" title="Volver">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="ctx-reschedule-title">Reprogramar Cita</span>
      </div>

      <div class="ctx-reschedule-apt">{{ apt.title }}</div>

      <div class="ctx-field">
        <label class="ctx-field-label">Inicio</label>
        <input class="ctx-datetime"
          type="datetime-local"
          [(ngModel)]="newStart"
          (click)="stopProp($event)" />
      </div>

      <div class="ctx-field">
        <label class="ctx-field-label">Fin</label>
        <input class="ctx-datetime"
          type="datetime-local"
          [(ngModel)]="newEnd"
          [min]="newStart"
          (click)="stopProp($event)" />
      </div>

      @if (newEnd && newStart && !rescheduleValid) {
        <p class="ctx-validation-msg">El fin debe ser posterior al inicio.</p>
      }

      <div class="ctx-reschedule-actions">
        <button class="ctx-btn-cancel" (click)="cancelReschedule($event)">Cancelar</button>
        <button class="ctx-btn-confirm"
          [disabled]="!rescheduleValid"
          (click)="confirmReschedule($event)">
          Confirmar
        </button>
      </div>
    </div>

  } @else {

    <!-- ── Normal menu ── -->
    <div class="ctx-header">
      <span class="ctx-apt-title">{{ apt.title }}</span>
      <span class="ctx-status-dot" [class]="'dot-' + apt.status"></span>
    </div>

    <div class="ctx-divider"></div>

    <button class="ctx-item" (click)="openReschedule($event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
        <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Reprogramar
    </button>

    <button class="ctx-item" (click)="emit({ type: 'edit' }, $event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
      </svg>
      Ver / Editar Detalles
    </button>

    <button class="ctx-item ctx-item--has-sub"
      (mouseenter)="showStatusSubmenu = true"
      (mouseleave)="showStatusSubmenu = false"
      (click)="stopProp($event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      Cambiar Estado
      <svg class="ctx-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round" width="12" height="12">
        <polyline points="9 18 15 12 9 6"/>
      </svg>

      @if (showStatusSubmenu) {
        <div class="ctx-submenu"
          (mouseenter)="showStatusSubmenu = true"
          (mouseleave)="showStatusSubmenu = false">
          @for (s of availableStatuses; track s.value) {
            <button class="ctx-item ctx-status-item"
              [class.active]="apt.status === s.value"
              (click)="setStatus(s.value, $event)">
              <span class="status-dot" [class]="'dot-' + s.value"></span>
              {{ s.label }}
            </button>
          }
        </div>
      }
    </button>

    <div class="ctx-divider"></div>

    <button class="ctx-item ctx-item--danger" (click)="emit({ type: 'delete' }, $event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/>
      </svg>
      Eliminar Cita
    </button>

  }

</div>
