<div class="cal-shell">

  <!-- Top bar -->
  <div class="cal-topbar">
    <div class="nav-group">
      <button class="btn-back" (click)="goBack()" title="Volver">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <button class="btn-nav" (click)="navigate(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h2 class="cal-header-label">{{ headerLabel }}</h2>
      <button class="btn-nav" (click)="navigate(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
      <button class="btn-today" (click)="goToday()">Hoy</button>
    </div>

    <div class="view-switcher">
      <button [class.active]="view==='month'" (click)="setView('month')">Mes</button>
      <button [class.active]="view==='week'"  (click)="setView('week')">Semana</button>
      <button [class.active]="view==='day'"   (click)="setView('day')">Día</button>
    </div>

    <button class="btn-crear">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Crear Cita
    </button>
  </div>

  <!-- Loading bar -->
  @if (isLoading) {
    <div class="loading-bar"><div class="loading-fill"></div></div>
  }

  <!-- Views -->
  <div class="cal-body">
    @if (view === 'month') {
      <app-month-view
        [appointments]="appointments"
        [currentDate]="currentDate"
        (eventClick)="onEventClick($event)"
        (dayClick)="onDayClick($event)"
      />
    }
    @if (view === 'week') {
      <app-week-view
        [appointments]="appointments"
        [currentDate]="currentDate"
        (eventClick)="onEventClick($event)"
      />
    }
    @if (view === 'day') {
      <app-day-view
        [appointments]="appointments"
        [currentDate]="currentDate"
        (eventClick)="onEventClick($event)"
      />
    }
  </div>

</div>
